services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://nabu:nabu@db:5432/nabu?sslmode=disable
      NABU_INITIAL_ADMIN_EMAIL: ${NABU_INITIAL_ADMIN_EMAIL:-}
      NABU_INITIAL_ADMIN_PASSWORD: ${NABU_INITIAL_ADMIN_PASSWORD:-}
      # No default on purpose: this file is the recommended self-hosting path
      # (see README), so a committed fallback would be a live signing key that
      # anyone reading this repo could forge access tokens with. Compose refuses
      # to start until it is set.
      NABU_AUTH_SECRET: ${NABU_AUTH_SECRET:?required — generate one with `openssl rand -base64 32`}
      # Secure-by-default, matching config.Load. Browsers treat http://localhost
      # as a secure context, so plain-HTTP local development still works; set
      # this false only to reach the app over plain HTTP off-localhost.
      NABU_COOKIE_SECURE: ${NABU_COOKIE_SECURE:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nabu
      POSTGRES_PASSWORD: nabu
      POSTGRES_DB: nabu
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nabu -d nabu"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
