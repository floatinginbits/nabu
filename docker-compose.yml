services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://nabu:nabu@db:5432/nabu?sslmode=disable
      NABU_INITIAL_ADMIN_EMAIL: ${NABU_INITIAL_ADMIN_EMAIL:-}
      NABU_INITIAL_ADMIN_PASSWORD: ${NABU_INITIAL_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nabu
      POSTGRES_PASSWORD: nabu
      POSTGRES_DB: nabu
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nabu -d nabu"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db-data:
