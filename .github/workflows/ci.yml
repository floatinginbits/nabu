name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build .

  # ADR-0001: generated code must never drift from queries.sql/migrations.
  sqlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: "1.31.1"
      - run: sqlc generate
      - run: git diff --exit-code

  # Frontend jobs (lint → type-check → test → build) are added when the
  # frontend scaffold lands.
