version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      npm-dependencies:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  # The docker ecosystem scans Dockerfiles only; this covers the images
  # pinned in docker-compose.yml (e.g. postgres).
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    groups:
      compose-images:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
