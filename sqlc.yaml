version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/store/migrations"
    queries: "internal/user/queries.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/user/sqlcgen"
        sql_package: "pgx/v5"
        # Without this the shared schema would emit task models here too.
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
          - db_type: "timestamptz"
            go_type: "time.Time"

  - engine: "postgresql"
    schema: "internal/store/migrations"
    queries: "internal/task/queries.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/task/sqlcgen"
        sql_package: "pgx/v5"
        omit_unused_structs: true
        emit_enum_valid_method: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
          - db_type: "timestamptz"
            go_type: "time.Time"

  - engine: "postgresql"
    schema: "internal/store/migrations"
    queries: "internal/auth/queries.sql"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/auth/sqlcgen"
        sql_package: "pgx/v5"
        omit_unused_structs: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
